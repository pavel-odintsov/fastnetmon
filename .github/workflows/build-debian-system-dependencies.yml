name: Build with Debian system dependencies

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_debian_system_dependencies:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu2204_system_dependencies
            docker_image: "ubuntu:jammy"
          - name: ubuntu2404_system_dependencies
            docker_image: "ubuntu:24.04"
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      - name: Start base container
        run: docker run --name linux_docker -d -t ${{ matrix.docker_image }}

      - name: Update package index
        run: docker exec linux_docker apt-get update || true

      - name: Install build dependencies
        run: |
          docker exec --env DEBIAN_FRONTEND linux_docker apt-get install -y \
            perl wget git cmake g++ make liblog4cpp5-dev libhiredis-dev \
            libmongoc-dev libbpf-dev libgrpc++-dev libprotobuf-dev \
            protobuf-compiler libcapnp-dev capnproto libssl-dev \
            protobuf-compiler-grpc libncurses5-dev libpcap-dev pkg-config \
            libboost-atomic-dev libboost-chrono-dev libboost-date-time-dev \
            libboost-program-options-dev libboost-regex-dev libboost-system-dev \
            libboost-thread-dev libabsl-dev

      - name: Clone FastNetMon repository
        run: docker exec linux_docker git clone https://github.com/pavel-odintsov/fastnetmon.git

      - name: Configure build
        run: |
          docker exec linux_docker mkdir fastnetmon/src/build
          docker exec linux_docker cmake -S fastnetmon/src -B fastnetmon/src/build \
            -DENABLE_AF_XDP_SUPPORT=FALSE -DLINK_WITH_ABSL=TRUE

      - name: Build FastNetMon
        run: docker exec linux_docker make -C fastnetmon/src/build -j
